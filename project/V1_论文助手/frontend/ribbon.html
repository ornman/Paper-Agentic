<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>WPS 插件入口</title>
  <script src="https://wps.cn/2019/v1/wpsjsrpcsdk.js"></script>
</head>
<body>
  <script>
    // WPS 插件初始化
    function OnOpenPane() {
      wps.ShowDialog('http://localhost:3001/taskpane.html', '论文助手', 800, 600, true)
    }

    // 自动打开任务窗格
    window.onload = function() {
      if (typeof wps !== 'undefined') {
        OnOpenPane()
      }
    }
  </script>
</body>
</html>
