version: '3.8'

services:
  backend:
    build: .
    container_name: paper-assistant-backend
    ports:
      - "8000:8000"
    environment:
      # API Keys（从 .env 文件读取）
      - KIMI_API_KEY=${KIMI_API_KEY}
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    volumes:
      # 数据持久化
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  data:
    driver: local
